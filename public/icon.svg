    <path d="M 0 0 Q 4 -6 12 -4 Q 14 4 8 8"
          fill="none" stroke="#FFB347" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M 0 0 Q -4 6 -12 4 Q -14 -4 -8 -8"
